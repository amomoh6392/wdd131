<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Picture Album for Temples</title>
    <meta name="description" content="Design, develop, test, and deploy a temple album page using my own selection of temple pictures.">
    <meta name="author" content="Abinadi Momoh Oke">
    <link rel="stylesheet" href="styles/temples.css">
    <link rel="stylesheet" href="styles/temples-large.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    <script src="scripts/temples.js" defer></script>
</head>
<body>
    <header>
        <h2>Temple Album</h2>
        <button id="menu" aria-label="Open navigation menu" aria-expanded="false">☰</button>
        <nav aria-label="Main Navigation">
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Old</a></li>
                <li><a href="#">New</a></li>
                <li><a href="#">Large</a></li>
                <li><a href="#">Small</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <h1>Home</h1>
        <section class="temples">
            <figure>
                <img src="images/benin-city-nigeria-temple.jpg" alt="View of the Benin City Nigeria Temple" loading="lazy" width="400" height="250">
                <figcaption>Benin City Nigeria Temple</figcaption>
            </figure>
            <figure>
                <img src="images/gilbert-arizona-temple.jpg" alt="View of the Gilbert Arizona Temple" loading="lazy" width="400" height="250">
                <figcaption>Gilbert Arizona Temple</figcaption>
            </figure>
            <figure>
                <img src="images/lagos-nigeria-temple.jpg" alt="View of the Lagos Nigeria Temple" loading="lazy" width="400" height="250">
                <figcaption>Lagos Nigeria Temple</figcaption>
            </figure>
            <figure>
                <img src="images/layton-temple.jpg" alt="View of the Layton Temple" loading="lazy" width="400" height="250">
                <figcaption>Layton Temple</figcaption>
            </figure>
            <figure>
                <img src="images/lehi-utah-temple.jpg" alt="View of the Lehi-Utah-Temple" loading="lazy" width="400" height="250">
                <figcaption>Lehi Utah Temple</figcaption>
            </figure>
            <figure>
                <img src="images/oakland-california-temple.jpg" alt="View of the Oakland California Temple" loading="lazy" width="400" height="250">
                <figcaption>Oakland California Temple</figcaption>
            </figure>
            <figure>
                <img src="images/provo-utah-temple.jpg" alt="View of the Provo Utah Temple" loading="lazy" width="400" height="250">
                <figcaption>Provo Utah Temple</figcaption>
            </figure>
            <figure>
                <img src="images/salt-lake-temple.jpg" alt="View of the Salt Lake Temple" loading="lazy" width="400" height="250">
                <figcaption>Salt Lake Temple</figcaption>
            </figure>
            <figure>
                <img src="images/west-jordan-utah-temple.jpg" alt="View of the West Jordan Utah Temple" loading="lazy" width="400" height="250">
                <figcaption>West Jordan Utah Temple</figcaption>
            </figure>
        </section>
    </main>
    <footer>
        <p>&copy; ※<span id="currentyear"></span>※ ABINADI MOMOH OKE ※ NIGERIA ※</p>
        <p id="lastmodified"></p>
    </footer>
</body>
</html>
